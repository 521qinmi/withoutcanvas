<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Salesforce Account Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        
        .container { 
            width: 100%;
            height: 100%;
            max-width: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        
        .card {
            background: white;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
            width: 100%;
        }
        
        .card-header {
            background: #0070d2;
            color: white;
            padding: 12px 16px;
            flex-shrink: 0;
        }
        
        .card-header h1 { 
            font-size: 16px; 
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .card-header p { 
            opacity: 0.9; 
            font-size: 12px;
            margin: 0;
        }
        
        .status-bar {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 8px 16px;
            margin: 0;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .status-bar.has-data {
            background: #d4edda;
            border-left-color: #28a745;
        }
        
        .card-body { 
            padding: 16px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .form-group { 
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        label { 
            display: block; 
            margin-bottom: 4px; 
            font-weight: 500; 
            color: #333;
            font-size: 12px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0070d2;
            box-shadow: 0 0 0 2px rgba(0,112,210,0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .btn-group { 
            display: flex; 
            gap: 8px; 
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
        }
        
        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .btn-primary { background: #0070d2; color: white; }
        .btn-primary:hover { background: #005fb2; }
        
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        
        .alert {
            padding: 10px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        
        .alert-success { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb;
        }
        
        .alert-error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb;
        }
        
        .sf-info {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }
        
        h3 {
            font-size: 14px;
            color: #333;
            margin: 16px 0 12px 0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Scrollbar styling */
        .card-body::-webkit-scrollbar {
            width: 8px;
        }
        
        .card-body::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        .card-body::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        
        .card-body::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Responsive adjustments */
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 12px;
            }
            
            .card-header {
                padding: 10px 12px;
            }
            
            .card-header h1 {
                font-size: 14px;
            }
            
            .card-body {
                padding: 12px;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>📝 Account Information</h1>
                <p th:text="'Record ID: ' + ${recordId}">Record ID: ...</p>
            </div>
            
            <div class="card-body">
                <!-- Status Bar -->
                <div th:if="${mode == 'edit'}" class="status-bar has-data">
                    <strong>✅ Data Loaded:</strong> Showing saved information from local storage
                </div>
                <div th:if="${mode == 'create'}" class="status-bar">
                    <strong>ℹ️ New Record:</strong> Data loaded from Salesforce. Fill in additional details and save.
                </div>
                
                <!-- Success/Error Messages -->
                <div id="successMessage" class="alert alert-success" style="display: none;"></div>
                <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
                
                <!-- Form -->
                <form id="mainForm">
                    <!-- Hidden Fields -->
                    <input type="hidden" name="sfRecordId" id="sfRecordId" th:value="${formData.sfRecordId}">
                    <input type="hidden" name="sfObjectType" value="Account">
                    <input type="hidden" name="mode" th:value="${mode}">
                    
                    <!-- Basic Information -->
                    <h3 style="margin-bottom: 15px; color: #333;">Basic Information</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Account Name *</label>
                            <input type="text" name="accountName" id="accountName" required 
                                   th:value="${formData.accountName != null ? formData.accountName : ''}" 
                                   placeholder="Enter account name">
                            <span class="sf-info">From Salesforce</span>
                        </div>
                        <div class="form-group">
                            <label>Account Number</label>
                            <input type="text" name="accountNumber" id="accountNumber" 
                                   th:value="${formData.accountNumber != null ? formData.accountNumber : ''}"
                                   placeholder="Auto-generated or manual entry">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" name="phone" id="phone" 
                                   th:value="${formData.phone != null ? formData.phone : ''}"
                                   placeholder="(555) 123-4567">
                        </div>
                        <div class="form-group">
                            <label>Website</label>
                            <input type="url" name="website" id="website" 
                                   th:value="${formData.website != null ? formData.website : ''}"
                                   placeholder="https://example.com">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Industry</label>
                            <select name="industry" id="industry" th:value="${formData.industry != null ? formData.industry : ''}">
                                <option value="">Select Industry</option>
                                <option value="Agriculture">Agriculture</option>
                                <option value="Construction">Construction</option>
                                <option value="Consulting">Consulting</option>
                                <option value="Education">Education</option>
                                <option value="Finance">Finance</option>
                                <option value="Government">Government</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Hospitality">Hospitality</option>
                                <option value="Insurance">Insurance</option>
                                <option value="Manufacturing">Manufacturing</option>
                                <option value="Media">Media</option>
                                <option value="Nonprofit">Nonprofit</option>
                                <option value="Real Estate">Real Estate</option>
                                <option value="Retail">Retail</option>
                                <option value="Technology">Technology</option>
                                <option value="Telecommunications">Telecommunications</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Utilities">Utilities</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Annual Revenue (USD)</label>
                            <input type="number" name="annualRevenue" id="annualRevenue" 
                                   th:value="${formData.annualRevenue != null ? formData.annualRevenue : ''}"
                                   placeholder="0.00">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Number of Employees</label>
                            <input type="number" name="numberOfEmployees" id="numberOfEmployees" 
                                   th:value="${formData.numberOfEmployees != null ? formData.numberOfEmployees : ''}"
                                   placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Ownership</label>
                            <select name="ownership" id="ownership">
                                <option value="">Select Ownership</option>
                                <option value="Private">Private</option>
                                <option value="Public">Public</option>
                                <option value="Subsidiary">Subsidiary</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Address Information -->
                    <h3 style="margin: 25px 0 15px; color: #333;">Address Information</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Billing Street</label>
                            <input type="text" name="billingStreet" id="billingStreet" 
                                   th:value="${formData.billingStreet != null ? formData.billingStreet : ''}"
                                   placeholder="Street address">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Billing City</label>
                            <input type="text" name="billingCity" id="billingCity" 
                                   th:value="${formData.billingCity != null ? formData.billingCity : ''}"
                                   placeholder="City">
                        </div>
                        <div class="form-group">
                            <label>Billing State/Province</label>
                            <input type="text" name="billingState" id="billingState" 
                                   th:value="${formData.billingState != null ? formData.billingState : ''}"
                                   placeholder="State/Province">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Billing Postal Code</label>
                            <input type="text" name="billingPostalCode" id="billingPostalCode" 
                                   th:value="${formData.billingPostalCode != null ? formData.billingPostalCode : ''}"
                                   placeholder="Postal code">
                        </div>
                        <div class="form-group">
                            <label>Billing Country</label>
                            <input type="text" name="billingCountry" id="billingCountry" 
                                   th:value="${formData.billingCountry != null ? formData.billingCountry : ''}"
                                   placeholder="Country">
                        </div>
                    </div>
                    
                    <!-- Additional Information -->
                    <h3 style="margin: 25px 0 15px; color: #333;">Additional Information</h3>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" id="description" rows="4" 
                                  th:text="${formData.description != null ? formData.description : ''}"
                                  placeholder="Enter additional details about this account..."></textarea>
                    </div>
                    
                    <!-- Button Group -->
                    <div class="btn-group">
                        <button type="submit" class="btn btn-success" id="saveBtn">
                            💾 Save to Local Storage
                        </button>
                        <button type="button" class="btn btn-primary" id="syncBtn" onclick="syncToSalesforce()">
                            🔄 Sync to Salesforce
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="notifyClose()">
                            ✕ Close
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // ========== Configuration ==========
        const config = {
            recordId: /*[[${recordId}]]*/ '001xx000003DGb2AAG',
            mode: /*[[${mode}]]*/ 'create',
            hasSavedData: /*[[${hasSavedData}]]*/ false,
            trustedOrigins: [
                'https://ibm112-dev-ed.develop.lightning.force.com',
                'https://ibm112-dev-ed.develop.my.salesforce.com',
                'https://withoutcanvas.onrender.com',
                window.location.origin
            ],
            debug: true
        };
        
        // Log initialization
        console.log('Form initialized:', {
            recordId: config.recordId,
            mode: config.mode,
            hasSavedData: config.hasSavedData
        });
        
        // ========== PostMessage Communication with LWC ==========
        
        /**
         * Send message to parent LWC component
         */
        function sendToLWC(message) {
            if (window.parent && window.parent !== window) {
                // Send to all trusted origins
                config.trustedOrigins.forEach(origin => {
                    if (origin !== window.location.origin) {
                        window.parent.postMessage(message, origin);
                    }
                });
                // Also send to current origin
                window.parent.postMessage(message, '*');
                
                if (config.debug) {
                    console.log('Sent to LWC:', message);
                }
            }
        }
        
        /**
         * Notify LWC that form is ready
         */
        function notifyReady() {
            sendToLWC({
                type: 'formReady',
                recordId: config.recordId,
                mode: config.mode,
                hasSavedData: config.hasSavedData,
                timestamp: Date.now()
            });
        }
        
        /**
         * Notify LWC of successful save
         */
        function notifySaveSuccess(data) {
            sendToLWC({
                type: 'formSaved',
                recordId: config.recordId,
                data: data,
                timestamp: Date.now()
            });
        }
        
        /**
         * Notify LWC of save error
         */
        function notifySaveError(error) {
            sendToLWC({
                type: 'formSaveError',
                recordId: config.recordId,
                error: error,
                timestamp: Date.now()
            });
        }
        
        /**
         * Notify to close modal
         */
        function notifyClose() {
            sendToLWC({
                type: 'closeModal',
                timestamp: Date.now()
            });
        }
        
        /**
         * Request refresh of parent page
         */
        function requestRefresh() {
            sendToLWC({
                type: 'refreshParent',
                timestamp: Date.now()
            });
        }
        
        // Listen for messages from LWC
        window.addEventListener('message', function(event) {
            if (config.debug) {
                console.log('Received from LWC:', event.data, 'from origin:', event.origin);
            }
            
            // Validate origin (optional, for production)
            // if (!config.trustedOrigins.includes(event.origin)) return;
            
            const message = event.data;
            
            switch(message.type) {
                case 'refreshData':
                    // LWC requests data refresh
                    location.reload();
                    break;
                    
                case 'saveData':
                    // LWC triggers save
                    document.getElementById('mainForm').requestSubmit();
                    break;
                    
                case 'closeModal':
                    // LWC requests close
                    notifyClose();
                    break;
                    
                case 'setLoading':
                    // LWC shows/hides loading indicator
                    // Can implement loading overlay here
                    break;
            }
        });
        
        // Notify LWC that form is ready after a short delay
        setTimeout(notifyReady, 500);
        
        // ========== Form Submission ==========
        
        document.getElementById('mainForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '⏳ Saving...';
            
            try {
                // Collect form data
                const formData = new FormData(this);
                const data = Object.fromEntries(formData.entries());
                
                // Ensure recordId is included
                data.sfRecordId = config.recordId;
                data.sfObjectType = 'Account';
                data.savedAt = new Date().toISOString();
                data.savedBy = 'Java App';
                
                console.log('Saving data:', data);
                
                // Send to backend
                const response = await fetch('/form/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Show success message
                    const successMsg = document.getElementById('successMessage');
                    successMsg.textContent = '✅ Data saved successfully to local storage!';
                    successMsg.style.display = 'block';
                    
                    // Hide error message
                    document.getElementById('errorMessage').style.display = 'none';
                    
                    // Notify LWC
                    notifySaveSuccess(result);
                    
                    // Update mode to edit
                    config.mode = 'edit';
                    config.hasSavedData = true;
                    document.querySelector('.status-bar').className = 'status-bar has-data';
                    document.querySelector('.status-bar').innerHTML = '<strong>✅ Data Saved:</strong> Information stored in local storage';
                    
                    // Auto-hide success message after 3 seconds
                    setTimeout(() => {
                        successMsg.style.display = 'none';
                    }, 3000);
                    
                } else {
                    throw new Error(result.error || 'Failed to save data');
                }
                
            } catch (error) {
                console.error('Save error:', error);
                
                // Show error message
                const errorMsg = document.getElementById('errorMessage');
                errorMsg.textContent = '❌ Error: ' + error.message;
                errorMsg.style.display = 'block';
                
                // Hide success message
                document.getElementById('successMessage').style.display = 'none';
                
                // Notify LWC
                notifySaveError(error.message);
                
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        });
        
        /**
         * Sync data to Salesforce (future implementation)
         */
        async function syncToSalesforce() {
            alert('Sync to Salesforce feature will be implemented in the next version.');
            // Future: Call Salesforce API to update the record
        }
        
        // ========== Utility Functions ==========
        
        /**
         * Format currency
         */
        function formatCurrency(value) {
            if (!value) return '';
            const num = parseFloat(value);
            if (isNaN(num)) return '';
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(num);
        }
        
        /**
         * Format number with commas
         */
        function formatNumber(value) {
            if (!value) return '';
            const num = parseInt(value);
            if (isNaN(num)) return '';
            return new Intl.NumberFormat('en-US').format(num);
        }
        
        // Add formatting listeners
        document.getElementById('annualRevenue')?.addEventListener('blur', function() {
            this.value = formatCurrency(this.value);
        });
        
        document.getElementById('numberOfEmployees')?.addEventListener('blur', function() {
            this.value = formatNumber(this.value);
        });
        
        // ========== Auto-save Draft (Optional) ==========
        
        let autoSaveTimer;
        document.querySelectorAll('input, textarea, select').forEach(input => {
            input.addEventListener('input', function() {
                clearTimeout(autoSaveTimer);
                autoSaveTimer = setTimeout(() => {
                    if (config.debug) {
                        console.log('Auto-saving draft...');
                    }
                    // Could implement auto-save here
                }, 5000); // Auto-save after 5 seconds of inactivity
            });
        });
        
        // ========== Debug Info ==========
        
        if (config.debug) {
            console.log('=== Form Debug Info ===');
            console.log('Record ID:', config.recordId);
            console.log('Mode:', config.mode);
            console.log('Has Saved Data:', config.hasSavedData);
            console.log('Current URL:', window.location.href);
            console.log('Parent Origin:', window.parent !== window ? 'In iframe' : 'Not in iframe');
        }
    </script>
</body>
</html>
