<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Salesforce Account Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: #0070d2;
            color: white;
            padding: 20px;
        }
        .card-header h1 { font-size: 20px; margin-bottom: 5px; }
        .card-header p { opacity: 0.9; font-size: 13px; }
        .card-body { padding: 24px; }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group { 
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #333; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0070d2;
            box-shadow: 0 0 0 2px rgba(0,112,210,0.1);
        }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary { background: #0070d2; color: white; }
        .btn-primary:hover { background: #005fb2; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .sf-info {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>📝 Salesforce Account</h1>
            </div>
            
            <div class="card-body">
                <!-- Success/Error Messages -->
                <div th:if="${success}" class="alert alert-success" th:text="${message}"></div>
                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
                
                <!-- Form -->
                <form th:action="${mode == 'create' ? '/form/create' : '/form/update/' + recordId}" method="post" id="mainForm">
                    <!-- Salesforce Hidden Fields -->
                    <input type="hidden" name="sfRecordId" th:value="${formData.sfRecordId}">
                    <input type="hidden" name="sfObjectType" th:value="${formData.sfObjectType}">
                    <input type="hidden" name="sfObjectName" th:value="${formData.sfObjectName}">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Account Name *</label>
                            <input type="text" name="accountName" required th:value="${formData.accountName}">
                            <span class="sf-info" th:if="${formData.sfRecordId != null}">SF Record: <span th:text="${formData.sfRecordId}"></span></span>
                        </div>
                        <div class="form-group">
                            <label>Account Number</label>
                            <input type="text" name="accountNumber" th:value="${formData.accountNumber}">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" name="phone" th:value="${formData.phone}">
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" name="address" th:value="${formData.address}">
                        </div>
                    </div>
                    
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">
                            <span th:if="${mode == 'create'}">💾 Save Record</span>
                            <span th:if="${mode == 'edit'}">✏️ Update Record</span>
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // Get form mode
        const mode = /*[[${mode}]]*/ 'create';
        const recordId = /*[[${recordId}]]*/ null;
        const sfRecordId = /*[[${sfRecordId}]]*/ null;
        
        // Notify parent window (Salesforce LWC) of mode info
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({
                type: 'modeInfo',
                mode: mode,
                recordId: recordId,
                sfRecordId: sfRecordId
            }, '*');
        }
        
        // Notify parent window after successful save
        const successMessage = document.querySelector('.alert-success');
        if (successMessage) {
            if (window.parent && window.parent !== window) {
                const messageType = mode === 'create' ? 'formSaved' : 'formUpdated';
                window.parent.postMessage({
                    type: messageType,
                    recordId: recordId,
                    sfRecordId: sfRecordId,
                    timestamp: Date.now()
                }, '*');
            }
            
            // Auto close modal after 2 seconds (optional)
            setTimeout(() => {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({
                        type: 'closeModal',
                        timestamp: Date.now()
                    }, '*');
                }
            }, 2000);
        }
        
        // Close modal function
        function closeModal() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: 'closeModal',
                    timestamp: Date.now()
                }, '*');
            }
        }
        
        // Close modal when cancel button is clicked
        document.querySelector('.btn-secondary')?.addEventListener('click', closeModal);
    </script>
</body>
</html>
