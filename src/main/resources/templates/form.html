<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Salesforce Account Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: #0070d2;
            color: white;
            padding: 20px;
        }
        .card-header h1 { font-size: 20px; margin-bottom: 5px; }
        .card-header p { opacity: 0.9; font-size: 13px; }
        .card-body { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #333; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0070d2;
            box-shadow: 0 0 0 2px rgba(0,112,210,0.1);
        }
        .info-box {
            background: #e8f0fe;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .info-box p { margin: 5px 0; font-size: 13px; color: #005fb2; }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary { background: #0070d2; color: white; }
        .btn-primary:hover { background: #005fb2; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>📝 Salesforce Account</h1>
                <p th:if="${mode == 'create'}">Create</p>
                <p th:if="${mode == 'edit'}">Edit</p>
            </div>
            
            <div class="card-body">
                <!-- Salesforce 关联信息 -->
                <div class="info-box" th:if="${sfRecordId != null}">
                    <p><strong>📌 Related Salesforce Record</strong></p>
                    <p>RecordID: <span th:text="${sfRecordId}"></span></p>
                    <p th:if="${sfObjectName}">Record Name: <span th:text="${sfObjectName}"></span></p>
                    <p th:if="${sfObjectType}">Record Type: <span th:text="${sfObjectType}"></span></p>
                </div>
                
                <!-- 成功/错误消息 -->
                <div th:if="${success}" class="alert alert-success" th:text="${message}"></div>
                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
                
                <!-- 表单 -->
                <form th:action="${mode == 'create' ? '/form/create' : '/form/update/' + recordId}" method="post" id="mainForm">
                    <input type="hidden" name="sfRecordId" th:value="${formData.sfRecordId}">
                    <input type="hidden" name="sfObjectType" th:value="${formData.sfObjectType}">
                    <input type="hidden" name="sfObjectName" th:value="${formData.sfObjectName}">
                    
                    <div class="form-group">
                        <label>名称 *</label>
                        <input type="text" name="name" required th:value="${formData.name}">
                    </div>
                    
                    <div class="form-group">
                        <label>描述</label>
                        <textarea name="description" rows="3">[[${formData.description}]]</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>金额</label>
                        <input type="number" name="amount" step="0.01" th:value="${formData.amount}">
                    </div>
                    
                    <div class="form-group">
                        <label>状态</label>
                        <select name="status">
                            <option value="Draft" th:selected="${formData.status == 'Draft'}">草稿</option>
                            <option value="Submitted" th:selected="${formData.status == 'Submitted'}">已提交</option>
                            <option value="Approved" th:selected="${formData.status == 'Approved'}">已批准</option>
                        </select>
                    </div>
                    
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">
                            <span th:if="${mode == 'create'}">💾 保存记录</span>
                            <span th:if="${mode == 'edit'}">✏️ 更新记录</span>
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // 获取表单模式
        const mode = /*[[${mode}]]*/ 'create';
        const recordId = /*[[${recordId}]]*/ null;
        const sfRecordId = /*[[${sfRecordId}]]*/ null;
        
        // 通知父窗口（Salesforce LWC）模式信息
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({
                type: 'modeInfo',
                mode: mode,
                recordId: recordId,
                sfRecordId: sfRecordId
            }, '*');
        }
        
        // 保存成功后通知父窗口
        const successMessage = document.querySelector('.alert-success');
        if (successMessage) {
            // 通知父窗口表单已保存
            if (window.parent && window.parent !== window) {
                const messageType = mode === 'create' ? 'formSaved' : 'formUpdated';
                window.parent.postMessage({
                    type: messageType,
                    recordId: recordId,
                    sfRecordId: sfRecordId,
                    timestamp: Date.now()
                }, '*');
            }
            
            // 3秒后自动关闭模态框（可选）
            setTimeout(() => {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({
                        type: 'closeModal',
                        timestamp: Date.now()
                    }, '*');
                }
            }, 2000);
        }
        
        // 关闭模态框函数
        function closeModal() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: 'closeModal',
                    timestamp: Date.now()
                }, '*');
            }
        }
        
        // 如果用户点击取消按钮，关闭模态框
        document.querySelector('.btn-secondary')?.addEventListener('click', closeModal);
    </script>
</body>
</html>
